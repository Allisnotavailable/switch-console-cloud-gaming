<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0d0e12">
    <title>Nexus Cloud Console</title>

    <link rel="manifest" href="/manifest.json">

    <style>
        :root {
            --bg: #0d0e12;
            --fg: #f0f1f5;
            --fg-dim: #a0a5b5;
            --accent: #3a86ff;
            --card-w: clamp(140px, 25vw, 200px);
            --card-h: clamp(196px, 35vw, 280px);
            --card-gap: clamp(15px, 3vw, 25px);
            --transition-fast: 0.3s ease;
            --transition-shelf: 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        .system-bar, .sub-header, .game-card {
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        html, body {
            width: 100%;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            background: var(--bg);
            touch-action: pan-y pinch-zoom;
        }

        body {
            position: fixed;
            inset: 0;
            color: var(--fg);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            transition: background-image 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            background-size: cover;
            background-position: center;
            background-image: linear-gradient(rgba(13, 14, 18, 0.85), rgba(13, 14, 18, 0.95));
            background-color: var(--bg);
        }

        @media (prefers-reduced-motion: reduce) {
            body, .game-card, .game-card img, .game-shelf, .game-detail-panel {
                transition: none !important;
            }
        }

        :focus-visible {
            outline: 3px solid var(--fg);
            outline-offset: 3px;
        }

        svg { display: block; flex-shrink: 0; }

        /* Portrait warning - non-blocking */
        #portrait-warning {
            display: none;
            position: fixed;
            top: env(safe-area-inset-top);
            left: 0;
            right: 0;
            background: rgba(58, 134, 255, 0.9);
            backdrop-filter: blur(10px);
            color: #fff;
            padding: 8px 12px;
            text-align: center;
            font-size: 12px;
            font-weight: 600;
            z-index: 100;
        }

        @media screen and (orientation: portrait) and (max-width: 768px) {
            #portrait-warning { display: block; }
            :root {
                --card-w: clamp(120px, 35vw, 160px);
                --card-h: clamp(168px, 49vw, 224px);
            }
        }

        /* PWA Install Banner - dismissible */
        #pwa-banner {
            display: none;
            position: fixed;
            bottom: env(safe-area-inset-bottom);
            left: 0;
            right: 0;
            background: rgba(20, 21, 26, 0.98);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 16px;
            z-index: 999;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        #pwa-banner .banner-content {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #pwa-banner .banner-text {
            flex: 1;
            font-size: 13px;
            line-height: 1.4;
        }

        #pwa-banner .banner-close {
            background: rgba(255,255,255,0.1);
            border: none;
            color: var(--fg);
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        #main-wrapper {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            min-height: 0;
            padding: 
                calc(12px + env(safe-area-inset-top)) 
                calc(20px + env(safe-area-inset-right))
                calc(12px + env(safe-area-inset-bottom)) 
                calc(20px + env(safe-area-inset-left));
        }

        @media (min-width: 768px) and (orientation: landscape) {
            #main-wrapper {
                padding: 
                    calc(20px + env(safe-area-inset-top)) 
                    calc(40px + env(safe-area-inset-right))
                    calc(20px + env(safe-area-inset-bottom)) 
                    calc(40px + env(safe-area-inset-left));
            }
        }

        .system-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-height: 40px;
            flex-shrink: 0;
            z-index: 10;
            margin-bottom: 8px;
        }

        .user-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: clamp(13px, 3vw, 16px);
            background: rgba(255, 255, 255, 0.07);
            padding: 6px 14px;
            border-radius: 30px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .user-badge svg {
            width: 14px;
            height: 14px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-indicators {
            display: none;
            align-items: center;
            gap: 16px;
            font-size: 12px;
            font-weight: 500;
            color: var(--fg-dim);
        }

        @media (min-width: 640px) {
            .status-indicators { display: flex; }
        }

        .status-indicators span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-indicators #clock-label { color: var(--fg); }

        .settings-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.07);
            color: var(--fg);
            cursor: pointer;
        }

        .sub-header {
            display: none;
            align-items: center;
            gap: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 0;
            margin-bottom: 8px;
            font-size: 11px;
            font-weight: 600;
            color: var(--fg-dim);
            flex-shrink: 0;
            z-index: 10;
        }

        @media (min-width: 768px) and (orientation: landscape) {
            .sub-header { display: flex; }
        }

        .btn-prompt {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .icon-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--fg);
            color: var(--bg);
            width: 18px;
            height: 18px;
            border-radius: 50%;
        }

        .content-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            min-height: 0;
            overflow: hidden;
        }

        .game-detail-panel {
            margin-bottom: clamp(12px, 2vh, 18px);
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: clamp(10px, 2vh, 14px);
            opacity: 1;
            transform: translateY(0);
            transition: opacity var(--transition-fast), transform var(--transition-fast);
        }

        .game-detail-panel.fading {
            opacity: 0;
            transform: translateY(8px);
        }

        .game-title-display {
            font-size: clamp(20px, 5vw, 32px);
            font-weight: 800;
            letter-spacing: -0.5px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.6);
            min-height: clamp(28px, 6vw, 40px);
            line-height: 1.2;
        }

        .game-stats {
            display: flex;
            gap: clamp(16px, 4vw, 28px);
            flex-wrap: wrap;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .stat-label {
            font-size: clamp(10px, 2vw, 12px);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--fg-dim);
        }

        .stat-value {
            font-size: clamp(13px, 3vw, 16px);
            font-weight: 700;
        }

        .play-button {
            display: flex;
            align-items: center;
            gap: 10px;
            align-self: flex-start;
            background: var(--fg);
            color: var(--bg);
            border: none;
            padding: clamp(10px, 2vh, 13px) clamp(20px, 4vw, 28px);
            border-radius: 999px;
            font-size: clamp(13px, 3vw, 15px);
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.15s ease, opacity 0.15s ease;
            touch-action: manipulation;
        }

        .play-button:active { 
            transform: scale(0.96); 
            opacity: 0.9;
        }

        .carousel-container {
            display: flex;
            align-items: center;
            width: 100%;
            overflow: visible;
            padding: clamp(8px, 2vh, 10px) 0 clamp(4px, 1vh, 6px) 0;
            flex-shrink: 0;
            z-index: 10;
            touch-action: pan-x;
        }

        .game-shelf {
            display: flex;
            gap: var(--card-gap);
            transition: transform var(--transition-shelf);
            padding-left: clamp(10px, 5vw, 5vw);
            list-style: none;
            will-change: transform;
        }

        .game-card {
            min-width: var(--card-w);
            max-width: var(--card-w);
            height: var(--card-h);
            background: rgba(255, 255, 255, 0.03);
            border-radius: clamp(10px, 2vw, 14px);
            border: 2px solid transparent;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            padding: 0;
            font: inherit;
            color: inherit;
            position: relative;
            touch-action: manipulation;
        }

        .game-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            background: #1a1c22;
            pointer-events: none;
        }

        .game-card .fallback-label {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: clamp(11px, 2.5vw, 14px);
            font-weight: 600;
            padding: 12px;
            color: var(--fg-dim);
        }

        .game-card.focused {
            transform: scale(1.08) translateY(-8px);
            border-color: var(--fg);
            box-shadow: 0 15px 30px rgba(255, 255, 255, 0.15);
        }

        .game-card.focused img { transform: scale(1.05); }

        .game-card:not(.focused) {
            opacity: 0.6;
            transform: scale(0.92);
        }

        @media (max-width: 640px) {
            .game-card.focused {
                transform: scale(1.05) translateY(-5px);
            }
            .game-card:not(.focused) {
                transform: scale(0.95);
            }
        }

        #launch-toast {
            position: fixed;
            left: 50%;
            bottom: calc(60px + env(safe-area-inset-bottom));
            transform: translateX(-50%) translateY(20px);
            background: rgba(20, 21, 26, 0.95);
            border: 1px solid rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            font-size: clamp(12px, 3vw, 14px);
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--transition-fast), transform var(--transition-fast);
            max-width: 90vw;
            text-align: center;
        }

        #launch-toast.visible {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>

    <div id="portrait-warning">
        🔄 Rotate to landscape for the best experience
    </div>

    <div id="pwa-banner">
        <div class="banner-content">
            <div class="banner-text">
                <strong>💡 Tip:</strong> Add to Home Screen for full-screen mode
            </div>
            <button class="banner-close" id="dismiss-pwa">Got it</button>
        </div>
    </div>

    <div id="main-wrapper">

        <header class="system-bar">
            <div class="user-badge">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="8" r="4"></circle><path d="M4 20c0-4 3.5-7 8-7s8 3 8 7"></path></svg>
                <span id="username">Player</span>
            </div>
            <div class="header-right">
                <div class="status-indicators">
                    <span id="ping-label">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 8.5a16 16 0 0 1 20 0"></path><path d="M5.5 12.5a11 11 0 0 1 13 0"></path><path d="M9 16.5a6 6 0 0 1 6 0"></path><circle cx="12" cy="20" r="1.2" fill="currentColor" stroke="none"></circle></svg>
                        <span class="ping-text">--ms</span>
                    </span>
                    <span id="clock-label" aria-live="off">--:--</span>
                </div>
                <button type="button" class="settings-btn" aria-label="Settings">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1.04 1.56V21a2 2 0 1 1-4 0v-.09A1.7 1.7 0 0 0 9 19.4a1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-1.56-1.04H3a2 2 0 1 1 0-4h.09A1.7 1.7 0 0 0 4.6 9a1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1.04-1.56V3a2 2 0 1 1 4 0v.09A1.7 1.7 0 0 0 15 4.6a1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 9a1.7 1.7 0 0 0 1.56 1.04H21a2 2 0 1 1 0 4h-.09A1.7 1.7 0 0 0 19.4 15z"></path></svg>
                </button>
            </div>
        </header>

        <div class="sub-header">
            <div class="btn-prompt">
                <span class="icon-btn" aria-hidden="true"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"></path></svg></span> Launch
            </div>
            <div class="btn-prompt">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8 7l-5 5 5 5"></path><path d="M16 7l5 5-5 5"></path></svg> Move
            </div>
            <div class="btn-prompt">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 8.5a16 16 0 0 1 20 0"></path><path d="M5.5 12.5a11 11 0 0 1 13 0"></path><path d="M9 16.5a6 6 0 0 1 6 0"></path><circle cx="12" cy="20" r="1.2" fill="currentColor" stroke="none"></circle></svg> cloud.nexus.xyz
            </div>
        </div>

        <div class="content-area">
            <div class="game-detail-panel" id="game-detail-panel">
                <div class="game-title-display" id="active-title" aria-live="polite">Loading hub…</div>

                <div class="game-stats">
                    <div class="stat-item">
                        <span class="stat-label">Playtime</span>
                        <span class="stat-value" id="stat-playtime">--</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Last Played</span>
                        <span class="stat-value" id="stat-lastplayed">--</span>
                    </div>
                </div>

                <button type="button" class="play-button" id="play-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"></path></svg>
                    Play
                </button>
            </div>

            <div class="carousel-container">
                <ul class="game-shelf" id="shelf" role="listbox" aria-label="Game library"></ul>
            </div>
        </div>
    </div>

    <div id="launch-toast" role="status" aria-live="polite"></div>

    <script>
    (function () {
        'use strict';

        const gamesCatalog = [
            {
                title: "Super Smash Bros. Ultimate",
                cover: "https://images.igdb.com/igdb/image/upload/t_cover_big/co1qxe.jpg",
                bg: "https://images.igdb.com/igdb/image/upload/t_1080p/sc6qmn.jpg",
                stats: { totalTime: "14h 20m", lastPlayed: "Today" }
            },
            {
                title: "Zelda: Tears of the Kingdom",
                cover: "https://images.igdb.com/igdb/image/upload/t_cover_big/co5vbg.jpg",
                bg: "https://images.igdb.com/igdb/image/upload/t_1080p/scf55u.jpg",
                stats: { totalTime: "62h 05m", lastPlayed: "Yesterday" }
            },
            {
                title: "Mario Kart 8 Deluxe",
                cover: "https://images.igdb.com/igdb/image/upload/t_cover_big/co1tmu.jpg",
                bg: "https://images.igdb.com/igdb/image/upload/t_1080p/sc87l8.jpg",
                stats: { totalTime: "12h 45m", lastPlayed: "3 days ago" }
            },
            {
                title: "Hollow Knight",
                cover: "https://images.igdb.com/igdb/image/upload/t_cover_big/co1r7f.jpg",
                bg: "https://images.igdb.com/igdb/image/upload/t_1080p/sc6xki.jpg",
                stats: { totalTime: "8h 10m", lastPlayed: "Last week" }
            }
        ];

        let currentIndex = 0;
        let toastTimer = null;
        let fadeTimer = null;

        const shelf = document.getElementById('shelf');
        const activeTitle = document.getElementById('active-title');
        const statPlaytime = document.getElementById('stat-playtime');
        const statLastPlayed = document.getElementById('stat-lastplayed');
        const detailPanel = document.getElementById('game-detail-panel');
        const playBtn = document.getElementById('play-btn');
        const mainWrapper = document.getElementById('main-wrapper');
        const pwaBanner = document.getElementById('pwa-banner');
        const toast = document.getElementById('launch-toast');

        function isStandalone() {
            return window.matchMedia('(display-mode: standalone)').matches
                || window.navigator.standalone === true
                || document.referrer.includes('android-app://');
        }

        function checkPWAStatus() {
            const dismissed = localStorage.getItem('pwa-banner-dismissed');
            if (!isStandalone() && !dismissed) {
                setTimeout(() => {
                    pwaBanner.style.display = 'block';
                }, 2000);
            }
        }

        document.getElementById('dismiss-pwa')?.addEventListener('click', () => {
            pwaBanner.style.display = 'none';
            localStorage.setItem('pwa-banner-dismissed', 'true');
        });

        function initDashboard() {
            shelf.innerHTML = '';

            gamesCatalog.forEach((game, index) => {
                const li = document.createElement('li');

                const card = document.createElement('button');
                card.type = 'button';
                card.className = `game-card${index === 0 ? ' focused' : ''}`;
                card.setAttribute('role', 'option');
                card.setAttribute('aria-selected', index === 0 ? 'true' : 'false');
                card.setAttribute('aria-label', game.title);

                const img = document.createElement('img');
                img.src = game.cover;
                img.alt = '';
                img.loading = 'lazy';
                img.draggable = false;
                img.onerror = () => {
                    img.remove();
                    const fallback = document.createElement('div');
                    fallback.className = 'fallback-label';
                    fallback.textContent = game.title;
                    card.appendChild(fallback);
                };
                card.appendChild(img);

                card.addEventListener('click', (e) => {
                    e.preventDefault();
                    if (index === currentIndex) {
                        launchGame(game);
                    } else {
                        currentIndex = index;
                        updateFocus();
                    }
                });

                li.appendChild(card);
                shelf.appendChild(li);
            });

            playBtn.addEventListener('click', () => launchGame(gamesCatalog[currentIndex]));

            updateFocus();
        }

        function launchGame(game) {
            if (toastTimer) clearTimeout(toastTimer);
            toast.textContent = `Starting: ${game.title}`;
            toast.classList.add('visible');
            toastTimer = setTimeout(() => toast.classList.remove('visible'), 2200);
        }

        function updateFocus() {
            const cards = shelf.querySelectorAll('.game-card');
            cards.forEach((card, idx) => {
                const selected = idx === currentIndex;
                card.classList.toggle('focused', selected);
                card.setAttribute('aria-selected', selected ? 'true' : 'false');
            });

            const activeGame = gamesCatalog[currentIndex];

            if (fadeTimer) clearTimeout(fadeTimer);
            detailPanel.classList.add('fading');
            fadeTimer = setTimeout(() => {
                activeTitle.textContent = activeGame.title;
                statPlaytime.textContent = activeGame.stats.totalTime;
                statLastPlayed.textContent = activeGame.stats.lastPlayed;
                detailPanel.classList.remove('fading');
            }, 150);

            document.body.style.backgroundImage =
                `linear-gradient(rgba(13, 14, 18, 0.75), rgba(13, 14, 18, 0.95)), url('${activeGame.bg}')`;

            const cardWidth = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--card-w'));
            const gap = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--card-gap'));
            const offset = currentIndex * -(cardWidth + gap);
            shelf.style.transform = `translateX(${offset}px)`;
        }

        function moveNext() {
            if (currentIndex < gamesCatalog.length - 1) {
                currentIndex++;
                updateFocus();
            }
        }

        function movePrev() {
            if (currentIndex > 0) {
                currentIndex--;
                updateFocus();
            }
        }

        // Improved touch handling
        let touchstartX = 0;
        let touchstartY = 0;
        let isSwiping = false;
        const carousel = document.querySelector('.carousel-container');

        carousel.addEventListener('touchstart', e => {
            touchstartX = e.changedTouches[0].screenX;
            touchstartY = e.changedTouches[0].screenY;
            isSwiping = false;
        }, { passive: true });

        carousel.addEventListener('touchmove', e => {
            if (!isSwiping) {
                const touchX = e.changedTouches[0].screenX;
                const touchY = e.changedTouches[0].screenY;
                const diffX = Math.abs(touchX - touchstartX);
                const diffY = Math.abs(touchY - touchstartY);
                
                if (diffX > diffY && diffX > 10) {
                    isSwiping = true;
                }
            }
        }, { passive: true });

        carousel.addEventListener('touchend', e => {
            if (isSwiping) {
                const touchendX = e.changedTouches[0].screenX;
                const diff = touchendX - touchstartX;
                
                if (diff < -50) moveNext();
                else if (diff > 50) movePrev();
            }
        }, { passive: true });

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') {
                e.preventDefault();
                moveNext();
            }
            else if (e.key === 'ArrowLeft') {
                e.preventDefault();
                movePrev();
            }
            else if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                launchGame(gamesCatalog[currentIndex]);
            }
        });

        function updateClock() {
            const now = new Date();
            document.getElementById('clock-label').textContent =
                now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }
        
        setInterval(updateClock, 30000);
        updateClock();

        // Simulate ping
        setTimeout(() => {
            const pingText = document.querySelector('.ping-text');
            if (pingText) pingText.textContent = Math.floor(Math.random() * 20 + 10) + 'ms';
        }, 1000);

        // Initialize
        initDashboard();
        checkPWAStatus();

        // Handle window resize
        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                updateFocus();
            }, 250);
        });

        // Prevent pull-to-refresh on mobile
        let lastTouchY = 0;
        let preventPullToRefresh = false;

        document.addEventListener('touchstart', (e) => {
            if (e.touches.length !== 1) return;
            lastTouchY = e.touches[0].clientY;
            preventPullToRefresh = window.pageYOffset === 0;
        }, { passive: false });

        document.addEventListener('touchmove', (e) => {
            const touchY = e.touches[0].clientY;
            const touchYDelta = touchY - lastTouchY;
            lastTouchY = touchY;

            if (preventPullToRefresh && touchYDelta > 0) {
                e.preventDefault();
            }
        }, { passive: false });

    })();
    </script>
</body>
</html>
